<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Resort Explore Prototype</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="title">RESORT EXPLORE</div>
      <div class="metrics">
        <div>速度 <span id="speed">0</span></div>
        <div>高度 <span id="altitude">0</span></div>
        <div>発見 <span id="found">0/0</span></div>
      </div>
      <div class="fuel-wrap">
        <span>FUEL</span>
        <div class="fuel"><div id="fuelBar"></div></div>
      </div>
    </div>

    <canvas id="minimap" width="180" height="180"></canvas>

    <div id="message" class="hidden"></div>

    <div id="startPanel">
      <h1>Resort Explore</h1>
      <p>島をジェットパックで探索するブラウザ版プロトタイプです。</p>
      <p class="small">クリックまたはタップで開始</p>
      <div class="keys">
        <div><b>W/A/S/D</b> 移動</div>
        <div><b>Space</b> 上昇</div>
        <div><b>Shift</b> 下降</div>
        <div><b>Boost</b> 常時ON</div>
        <div><b>Mouse</b> 視点操作</div>
      </div>
    </div>

    <div id="mobileControls" aria-label="mobile controls">
      <button data-key="w">▲</button>
      <div class="row">
        <button data-key="a">◀</button>
        <button data-key="s">▼</button>
        <button data-key="d">▶</button>
      </div>
      <div class="row right">
        <button data-key="space">上昇</button>
        <button data-key="shift">下降</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
