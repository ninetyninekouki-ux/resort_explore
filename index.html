<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resort Explore - Wuhu-style Island Prototype</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div class="hud-card title">RESORT EXPLORE v0.7</div>
      <div class="hud-card">高度 <span id="altitude">0</span>m</div>
      <div class="hud-card">速度 <span id="speed">0</span></div>
      <div class="hud-card">発見 <span id="discovered">0</span>/<span id="totalLandmarks">0</span></div>
      <div class="hud-card hint">WASD 移動 / Space 上昇 / Shift 下降 / マウス 視点 / C字砂州・高台湖・滝追加</div>
    </div>

    <div id="minimapWrap">
      <canvas id="minimap" width="220" height="220"></canvas>
      <div class="mini-label">MINI MAP</div>
    </div>

    <div id="message" class="message hidden"></div>

    <div id="startOverlay">
      <div class="start-panel">
        <h1>Resort Explore</h1>
        <p>ウーフーアイランド風のリゾート島をジェットパックで探索するプロトタイプです。</p>
        <p class="small">クリックで開始。A/Dは左右、ブーストは常時ON、無操作時は自由落下します。</p>
        <button id="startButton">START</button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
